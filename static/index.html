<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>💗</title>
<style>
  :root {
    --bg: #0d0d1a;
    --heart: #ff4d6d;
    --heart-glow: rgba(255,77,109,0.35);
    --text: #e8d5e0;
    --muted: #6b5d65;
    --connected: #4ade80;
    --card: #1a1a2e;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color: var(--text);
    padding: 24px;
    gap: 32px;
  }

  /* ── PIN screen ── */
  #pin-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
    width: 100%;
    max-width: 320px;
  }

  #pin-screen h2 {
    font-size: 20px;
    font-weight: 600;
    text-align: center;
    line-height: 1.4;
  }

  #pin-screen p {
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    line-height: 1.6;
  }

  .pin-dots {
    display: flex;
    gap: 14px;
    justify-content: center;
  }

  .pin-dot {
    width: 16px;
    height: 16px;
    border-radius: 50%;
    background: #2a2a40;
    transition: background 0.2s;
  }

  .pin-dot.filled { background: var(--heart); }

  .pin-keypad {
    display: grid;
    grid-template-columns: repeat(3, 72px);
    gap: 12px;
    justify-content: center;
  }

  .pin-key {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    border: 1px solid #2a2a40;
    background: var(--card);
    color: var(--text);
    font-size: 22px;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .pin-key:active { background: #2a2a40; transform: scale(0.93); }
  .pin-key.delete { font-size: 18px; color: var(--muted); }
  .pin-key.empty { border: none; background: none; cursor: default; }

  #pin-error {
    font-size: 13px;
    color: var(--heart);
    min-height: 18px;
    text-align: center;
  }

  #pin-submit {
    background: var(--heart);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 14px 40px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s;
    width: 100%;
  }

  #pin-submit:disabled { opacity: 0.4; cursor: default; }
  #pin-submit:not(:disabled):active { opacity: 0.8; }

  /* ── Main screen ── */
  #main-screen { display: none; flex-direction: column; align-items: center; gap: 32px; width: 100%; }

  #status {
    font-size: 14px;
    color: var(--muted);
    letter-spacing: 0.05em;
    transition: color 0.4s;
    height: 20px;
  }

  #heart-btn {
    width: 150px;
    height: 150px;
    border: none;
    background: none;
    cursor: pointer;
    padding: 0;
    -webkit-tap-highlight-color: transparent;
    outline: none;
  }

  #heart-btn svg {
    width: 100%;
    height: 100%;
    fill: var(--heart);
    filter: drop-shadow(0 0 24px var(--heart-glow));
    transition: filter 0.3s;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.07); }
  }

  body.connected #heart-btn svg {
    animation: pulse 2.2s ease-in-out infinite;
    filter: drop-shadow(0 0 32px var(--heart-glow));
  }

  @keyframes tap-burst {
    0%   { transform: scale(1); }
    25%  { transform: scale(1.35); }
    60%  { transform: scale(0.92); }
    100% { transform: scale(1); }
  }

  #heart-btn.tapped svg {
    animation: tap-burst 0.5s ease forwards !important;
  }

  #hint {
    font-size: 13px;
    color: var(--muted);
    text-align: center;
    line-height: 1.6;
  }

  #partner-taps {
    font-size: 13px;
    color: var(--heart);
    text-align: center;
    min-height: 18px;
    transition: opacity 0.3s;
  }

  #share-box {
    background: var(--card);
    border-radius: 14px;
    padding: 16px 20px;
    width: 100%;
    max-width: 340px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  #share-box p {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
  }

  #share-box .link-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  #room-link {
    flex: 1;
    font-size: 12px;
    color: var(--text);
    background: #111126;
    border: 1px solid #2a2a40;
    border-radius: 8px;
    padding: 8px 10px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    cursor: default;
    user-select: all;
  }

  #copy-btn {
    background: var(--heart);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.2s;
  }

  #copy-btn:active { opacity: 0.75; }

  #notify-btn {
    background: transparent;
    color: var(--muted);
    border: 1px solid #2a2a40;
    border-radius: 10px;
    padding: 10px 20px;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    width: 100%;
    max-width: 240px;
  }

  #notify-btn:hover { border-color: var(--heart); color: var(--heart); }
  #notify-btn:disabled { opacity: 0.5; cursor: default; border-color: var(--connected); color: var(--connected); }

  #no-push-banner {
    display: none;
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    max-width: 280px;
    line-height: 1.5;
    border: 1px solid #2a2a40;
    border-radius: 10px;
    padding: 10px 14px;
  }

  /* ── Message section ── */
  #msg-section {
    width: 100%;
    max-width: 340px;
    background: var(--card);
    border-radius: 16px;
    overflow: hidden;
  }

  #msg-lock {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 20px;
  }

  #msg-lock-icon { font-size: 28px; opacity: 0.5; }

  #msg-lock-text {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
  }

  #msg-progress-bar {
    width: 100%;
    height: 4px;
    background: #2a2a40;
    border-radius: 2px;
    overflow: hidden;
  }

  #msg-progress-fill {
    height: 100%;
    background: var(--heart);
    border-radius: 2px;
    width: 0%;
    transition: width 0.4s ease;
  }

  #msg-unlocked {
    display: none;
    flex-direction: column;
  }

  #msg-header {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    padding: 14px 16px 8px;
    border-bottom: 1px solid #2a2a40;
  }

  #msg-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 12px 14px;
    max-height: 220px;
    overflow-y: auto;
  }

  .msg-bubble {
    max-width: 80%;
    padding: 8px 12px;
    border-radius: 14px;
    font-size: 13px;
    line-height: 1.4;
    word-break: break-word;
  }

  .msg-bubble.mine {
    align-self: flex-end;
    background: var(--heart);
    color: white;
    border-bottom-right-radius: 4px;
  }

  .msg-bubble.theirs {
    align-self: flex-start;
    background: #2a2a40;
    color: var(--text);
    border-bottom-left-radius: 4px;
  }

  #msg-compose {
    display: flex;
    gap: 8px;
    padding: 10px 14px 14px;
    border-top: 1px solid #2a2a40;
    align-items: flex-end;
  }

  #msg-input {
    flex: 1;
    background: #111126;
    border: 1px solid #2a2a40;
    border-radius: 10px;
    color: var(--text);
    font-size: 13px;
    padding: 8px 12px;
    resize: none;
    min-height: 36px;
    max-height: 80px;
    font-family: inherit;
    outline: none;
    line-height: 1.4;
  }

  #msg-input:focus { border-color: var(--heart); }
  #msg-input::placeholder { color: var(--muted); }

  #msg-send {
    background: var(--heart);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 8px 14px;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
    transition: opacity 0.2s;
    height: 36px;
  }

  #msg-send:active { opacity: 0.75; }

  @keyframes unlock-pop {
    0%   { transform: scale(0.9); opacity: 0; }
    60%  { transform: scale(1.04); }
    100% { transform: scale(1); opacity: 1; }
  }

  #msg-section.just-unlocked { animation: unlock-pop 0.5s ease forwards; }
</style>
</head>
<body>

<!-- PIN screen -->
<div id="pin-screen">
  <h2 id="pin-title">Set your secret PIN</h2>
  <p id="pin-desc">Choose a 4-digit PIN. Share it privately with your partner — only you two can access this room.</p>
  <div class="pin-dots">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
  </div>
  <div id="pin-error"></div>
  <div class="pin-keypad">
    <button class="pin-key" data-n="1">1</button>
    <button class="pin-key" data-n="2">2</button>
    <button class="pin-key" data-n="3">3</button>
    <button class="pin-key" data-n="4">4</button>
    <button class="pin-key" data-n="5">5</button>
    <button class="pin-key" data-n="6">6</button>
    <button class="pin-key" data-n="7">7</button>
    <button class="pin-key" data-n="8">8</button>
    <button class="pin-key" data-n="9">9</button>
    <button class="pin-key empty"></button>
    <button class="pin-key" data-n="0">0</button>
    <button class="pin-key delete" id="pin-del">⌫</button>
  </div>
  <button id="pin-submit" disabled>Confirm</button>
</div>

<!-- Main screen -->
<div id="main-screen">
  <div id="status">connecting...</div>

  <button id="heart-btn" title="Tap to send love">
    <svg viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg">
      <path d="M50 85 C50 85 5 55 5 28 C5 14 16 5 28 5 C37 5 45 10 50 18 C55 10 63 5 72 5 C84 5 95 14 95 28 C95 55 50 85 50 85Z"/>
    </svg>
  </button>

  <div id="hint">tap to send 💗</div>
  <div id="partner-taps"></div>
  <div id="dbg" style="font-size:10px;color:#444;margin-top:-20px;"></div>

  <button id="notify-btn">Enable notifications</button>
  <div id="no-push-banner">Your browser doesn't support push notifications — taps are still sent 💗</div>

  <div id="msg-section">
    <div id="msg-lock">
      <div id="msg-lock-icon">💌</div>
      <div id="msg-lock-text">leave a message — unlocks at 20 💗</div>
      <div id="msg-progress-bar"><div id="msg-progress-fill"></div></div>
    </div>
    <div id="msg-unlocked">
      <div id="msg-header">💌 messages</div>
      <div id="msg-list"></div>
      <div id="msg-compose">
        <textarea id="msg-input" placeholder="write something..." rows="1"></textarea>
        <button id="msg-send">send</button>
      </div>
    </div>
  </div>

  <div id="share-box">
    <p>Share this link with your partner</p>
    <div class="link-row">
      <div id="room-link"></div>
      <button id="copy-btn">Copy</button>
    </div>
  </div>
</div>

<script>
let roomId, userId, userPin, isSubscribed = false, swReg = null, msgUnlocked = false;

// Permanent per-device ID — never changes across sessions
let deviceId = localStorage.getItem('lp_device_id');
if (!deviceId) {
  deviceId = Math.random().toString(36).slice(2) + Date.now().toString(36);
  localStorage.setItem('lp_device_id', deviceId);
}

// ── PIN keypad ────────────────────────────────────────────────────────────────
let pinBuffer = '';

function updateDots() {
  for (let i = 0; i < 4; i++) {
    document.getElementById('d' + i).classList.toggle('filled', i < pinBuffer.length);
  }
  document.getElementById('pin-submit').disabled = pinBuffer.length < 4;
}

document.querySelectorAll('.pin-key[data-n]').forEach(btn => {
  btn.addEventListener('click', () => {
    if (pinBuffer.length < 4) {
      pinBuffer += btn.dataset.n;
      updateDots();
    }
  });
});

document.getElementById('pin-del').addEventListener('click', () => {
  pinBuffer = pinBuffer.slice(0, -1);
  updateDots();
  document.getElementById('pin-error').textContent = '';
});

document.getElementById('pin-submit').addEventListener('click', handlePinSubmit);

// ── Helpers ───────────────────────────────────────────────────────────────────
function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
  const raw = window.atob(base64);
  const output = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; ++i) output[i] = raw.charCodeAt(i);
  return output;
}

function genRoomId() {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  return Array.from({length: 6}, () => chars[Math.floor(Math.random() * chars.length)]).join('');
}

function pushSupported() {
  return ('Notification' in window) && ('serviceWorker' in navigator) && ('PushManager' in window);
}

function showMain() {
  document.getElementById('pin-screen').style.display = 'none';
  document.getElementById('main-screen').style.display = 'flex';
}

// ── PIN flow ──────────────────────────────────────────────────────────────────
async function handlePinSubmit() {
  const pin = pinBuffer;
  const errEl = document.getElementById('pin-error');
  errEl.textContent = '';

  const hasPinRes = await fetch('/api/room/' + roomId + '/has-pin').then(r => r.json());

  if (!hasPinRes.has_pin) {
    // First person — set the PIN
    const res = await fetch('/api/room/set-pin', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ room_id: roomId, pin })
    });
    if (!res.ok) {
      // Race: partner set it just now, verify instead
      const verify = await fetch('/api/room/verify-pin', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ room_id: roomId, pin })
      });
      if (!verify.ok) {
        errEl.textContent = 'Wrong PIN. Try again.';
        pinBuffer = '';
        updateDots();
        return;
      }
    }
  } else {
    // Room already has a PIN — verify
    const verify = await fetch('/api/room/verify-pin', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ room_id: roomId, pin })
    });
    if (!verify.ok) {
      errEl.textContent = 'Wrong PIN. Try again.';
      pinBuffer = '';
      updateDots();
      return;
    }
  }

  // PIN accepted — register presence, server assigns user_id
  const joinRes = await fetch('/api/room/join', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ room_id: roomId, pin, session_id: deviceId })
  });
  if (!joinRes.ok) {
    errEl.textContent = 'Room is full (max 2 people).';
    return;
  }
  const joinData = await joinRes.json();
  userId = joinData.user_id;
  userPin = pin;
  localStorage.setItem('lp_pin_' + roomId, pin);
  showMain();
  startMain();
}

// ── Main app ──────────────────────────────────────────────────────────────────
async function pollStatus() {
  try {
    const r = await fetch('/api/room/' + roomId).then(r => r.json());
    const both = r.count >= 2;
    document.body.classList.toggle('connected', both);
    const el = document.getElementById('status');
    el.textContent = both ? 'Connected ✓' : 'Waiting for partner...';
    el.style.color = both ? 'var(--connected)' : 'var(--muted)';

    const partner = userId === 'a' ? 'b' : 'a';
    const partnerTaps = (r.taps && r.taps[partner]) || 0;
    const tapEl = document.getElementById('partner-taps');
    tapEl.textContent = partnerTaps > 0 ? `they've sent you ${partnerTaps} 💗` : '';

    // debug
    document.getElementById('dbg').textContent = `me:${userId} present:[${(r.slots||[]).join(',')}] count:${r.count}`;

    // message unlock progress
    const totalTaps = Object.values(r.taps || {}).reduce((a, b) => a + b, 0);
    const pct = Math.min(totalTaps / 20 * 100, 100);
    document.getElementById('msg-progress-fill').style.width = pct + '%';
    document.getElementById('msg-lock-text').textContent =
      totalTaps >= 20 ? 'unlocked 💌' : `leave a message — ${totalTaps}/20 💗`;

    if (totalTaps >= 20 && !msgUnlocked) {
      msgUnlocked = true;
      const sec = document.getElementById('msg-section');
      document.getElementById('msg-lock').style.display = 'none';
      document.getElementById('msg-unlocked').style.display = 'flex';
      sec.classList.add('just-unlocked');
      setTimeout(() => sec.classList.remove('just-unlocked'), 600);
      loadMessages();
    } else if (msgUnlocked) {
      loadMessages();
    }
  } catch(e) {
    document.getElementById('dbg').textContent = 'poll error: ' + e;
  }
}

async function loadMessages() {
  try {
    const r = await fetch(`/api/room/${roomId}/messages?pin=${userPin}`).then(r => r.json());
    const list = document.getElementById('msg-list');
    const wasAtBottom = list.scrollHeight - list.scrollTop <= list.clientHeight + 10;
    list.innerHTML = '';
    for (const m of r.messages) {
      const div = document.createElement('div');
      div.className = 'msg-bubble ' + (m.sender === userId ? 'mine' : 'theirs');
      div.textContent = m.content;
      list.appendChild(div);
    }
    if (wasAtBottom || r.messages.length <= 1) list.scrollTop = list.scrollHeight;
  } catch(e) {}
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const content = input.value.trim();
  if (!content) return;
  input.value = '';
  input.style.height = '';
  try {
    await fetch('/api/message', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ room_id: roomId, user_id: userId, pin: userPin, content })
    });
    loadMessages();
  } catch(e) {}
}

async function subscribeNotifications() {
  if (!pushSupported()) return false;
  const perm = await Notification.requestPermission();
  if (perm !== 'granted') return false;
  try {
    const reg = swReg || await navigator.serviceWorker.ready;
    const vapidKey = await fetch('/api/vapid-public-key').then(r => r.text());
    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(vapidKey)
    });
    await fetch('/api/subscribe', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ room_id: roomId, user_id: userId, pin: userPin, subscription: sub.toJSON() })
    });
    isSubscribed = true;
    const btn = document.getElementById('notify-btn');
    btn.textContent = 'Notifications on ✓';
    btn.disabled = true;
    return true;
  } catch(e) {
    console.warn('Push subscription failed:', e);
    return false;
  }
}

function startMain() {
  document.getElementById('room-link').textContent = window.location.href;

  if (!pushSupported()) {
    document.getElementById('notify-btn').style.display = 'none';
    document.getElementById('no-push-banner').style.display = 'block';
  }

  pollStatus();
  setInterval(pollStatus, 4000);
}

// Heart button — always tappable
document.getElementById('heart-btn').addEventListener('click', async () => {
  const btn = document.getElementById('heart-btn');
  btn.classList.remove('tapped');
  void btn.offsetWidth;
  btn.classList.add('tapped');
  setTimeout(() => btn.classList.remove('tapped'), 600);

  if (!isSubscribed && pushSupported()) {
    subscribeNotifications();
  }

  fetch('/api/ping', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ room_id: roomId, user_id: userId, pin: userPin })
  });
});

// Enable notifications button
document.getElementById('notify-btn').addEventListener('click', subscribeNotifications);

// Message send
document.getElementById('msg-send').addEventListener('click', sendMessage);
document.getElementById('msg-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
document.getElementById('msg-input').addEventListener('input', function() {
  this.style.height = '';
  this.style.height = Math.min(this.scrollHeight, 80) + 'px';
});

// Copy button
document.getElementById('copy-btn').addEventListener('click', () => {
  navigator.clipboard.writeText(window.location.href).then(() => {
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy', 1500);
  });
});

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  const params = new URLSearchParams(window.location.search);
  roomId = params.get('room');
  if (!roomId) {
    window.location.replace('/?room=' + genRoomId());
    return;
  }

  // Register service worker
  if ('serviceWorker' in navigator) {
    try {
      swReg = await navigator.serviceWorker.register('/sw.js');
    } catch(e) { console.warn('SW registration failed', e); }
  }

  // Check if PIN already saved locally and still valid
  const savedPin = localStorage.getItem('lp_pin_' + roomId);
  if (savedPin) {
    const hasPinRes = await fetch('/api/room/' + roomId + '/has-pin').then(r => r.json());
    if (hasPinRes.has_pin) {
      const joinRes = await fetch('/api/room/join', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ room_id: roomId, pin: savedPin, session_id: deviceId })
      });
      if (joinRes.ok) {
        const data = await joinRes.json();
        userId = data.user_id;
        userPin = savedPin;
        showMain();
        startMain();
        return;
      }
    }
    localStorage.removeItem('lp_pin_' + roomId);
  }

  // Show PIN screen with appropriate text
  const hasPinRes = await fetch('/api/room/' + roomId + '/has-pin').then(r => r.json());
  if (hasPinRes.has_pin) {
    document.getElementById('pin-title').textContent = 'Enter your PIN';
    document.getElementById('pin-desc').textContent = 'Enter the 4-digit PIN to access your love room 💗';
